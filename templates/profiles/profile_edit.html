{% extends 'base.html' %}

{% block title %}Редактирование профиля - RPG Portal{% endblock %}

{% block content %}
<h1>Редактирование профиля</h1>
<p style="margin-bottom: 1rem; color: #666;">Пользователь: <strong>{{ user.username }}</strong></p>

<form method="post">
    {% csrf_token %}
    
    <div class="form-group">
        <label for="{{ form.bio.id_for_label }}">{{ form.bio.label }}</label>
        {{ form.bio }}
        {{ form.bio.errors }}
    </div>
    
    <div style="display: flex; gap: 1rem;">
        <button type="submit" class="btn btn-primary">💾 Сохранить</button>
        <a href="{% url 'profiles:profile_detail' user.profile.pk %}" class="btn" style="background: #a0aec0; color: white;">↩️ Отмена</a>
    </div>
</form>
{% endblock %}
